front:
  text: 洞眞太上八素眞經修習功業妙訣通二太極四真人請問太上大道君曰受法傳經言聞之矣修習階漸縁何始乎道君曰初學之儔奉經治寫别室几案晨夜香燈供養存神朝夕禮拜所受髙上隨縁行之科法有異各在經中或應自口在乎其人受學不事朝禮即犯毀辱屢至功行不興必願成眞勿忘朝禮因縁有礙日夕不𢘆良晨不𧇊自有感效重爲子言之審付其人也眞人稽首受命奉行凡習功業精尋經誥受持要戒諳誦在心心存意解行之不疑不懈不退精進日新隨世教化依時行藏三洞諸經更互出没順運濟急勿强違縁應用髙低不可抑絶縁宜上下不可棄損當湏得中不可閉塞而強通通而苟塞上下及中顛倒違逆皆有災考不可不詳大運和時品依次苐不和之日各受少分深淺多少不得違階超越由縁慎勿乖運精心期眞嚴持戒耳齋法有十戒一者不得食含血之物有生炁并薫卒之屬唯菜非向生之月得食之二者平旦啜粥日中則食自是之後有甘肥美味一切不得復饗晝則燒香夜則然燈燒香不乏須㬰坐起卧息不離法則三者棄寫因縁唯道是務四者思經念誡洗心精進五者慈孝一切愍念悲窮開示生道以勸愚民六者悔謝罪過求乞生活七者委捨榮華所寳在道八者勞身苦體爲道驅使九者願除衆痛十苦八難免度厄世爲太平種民十者尊道貴德心口相副洗心精進志求仙儔承受經戒不敢𧇊違昇度之日與道合同髙上科曰監齋法師從齋之官誦經行道上髙座讀經一千言聽得一飲不在不誦之例此一條出四極明科中篇髙上科曰夫受星宿正治及奉受三寳經法洞眞玄經之法拜署齋法之後悉應受法難五戒而不受此五戒者不得叅同齋官繽錄之例并受眞契三一眞一以上又不受法難五戒者不得列名上宫又不得表奏星宿大章若未受而奏章仙都无名露章不被奏御所以爾者旣无法軌身不清廉是故不爲奏御又且星宿之官不受未戒不廉之師奏事故有大小科戒之法明各依承凡齋有五種之格如左第一救急治病承用天師㫖教法人三元方謝乞生丐活自縳泥額塗炭之法並在㫖教之中第二靈寳梵行集賢觀化修身種福之法其中又有生死謝罪責巳思愆之法第三上清仙隱爲七世先亡遷昇之齋亦隨月修直善行之法第四真一守寂思神吞炁導引之齋第五太一神丹宜祭爐火金液之法閉房經月之齋其别隱静養神續命清詠長齋不在五條之例又道士祭酒男女官巳叅受眞契并受上清三洞之經及星宿治法爲道欲得摽名玄都奏御㫖聞當受玄都法難五戒其戒文如左第一之戒不得不敬於天不得謂天无神呼地元鬼不得輕慢地祇山川大澤而穿鑿无忌是謂天地无靈罪犯无畏又不得教令人輕慢天地謂无神鬼
  hash: sha256:f1719be4b4dcaafc4b128c3f8a01c2d307168103298acdac3a45e22d14b221a3

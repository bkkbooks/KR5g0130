front:
  text: 洞真太上八素真經修習功業妙訣通二太極四真人請問太上大道君曰受法傳經言聞之矣修習階漸緣何始乎道君曰初學之儔奉經治寫别室几案晨夜香燈供養存神朝夕禮拜所受髙上隨緣行之科法有異各在經中或應自口在乎其人受學不事朝禮即犯毀辱屢至功行不興必願成真勿忘朝禮因緣有礙日夕不恆良晨不𧇊自有感效重為子言之審付其人也真人稽首受命奉行凡習功業精尋經誥受持要戒諳誦在心心存意解行之不疑不懈不退精進日新隨世教化依時行藏三洞諸經更互出沒順運濟急勿強違緣應用髙低不可抑絶緣宜上下不可棄損當須得中不可閉塞而強通通而苟塞上下及中顛倒違逆皆有災考不可不詳大運和時品依次苐不和之日各受少分深淺多少不得違階超越由緣慎勿乖運精心期真嚴持戒耳齋法有十戒一者不得食含血之物有生氣并薰卒之屬唯菜非向生之月得食之二者平旦啜粥日中則食自是之後有甘肥美味一切不得復饗晝則燒香夜則然燈燒香不乏須臾坐起卧息不離法則三者棄寫因緣唯道是務四者思經念誡洗心精進五者慈孝一切愍念悲窮開示生道以勸愚民六者悔謝罪過求乞生活七者委捨榮華所寶在道八者勞身苦體為道驅使九者願除衆痛十苦八難免度厄世為太平種民十者尊道貴德心口相副洗心精進志求仙儔承受經戒不敢𧇊違升度之日與道合同髙上科曰監齋法師從齋之官誦經行道上髙座讀經一千言聽得一飲不在不誦之例此一條出四極明科中篇髙上科曰夫受星宿正治及奉受三寶經法洞真玄經之法拜署齋法之後悉應受法難五戒而不受此五戒者不得參同齋官繽録之例并受真契三一真一以上又不受法難五戒者不得列名上宫又不得表奏星宿大章若未受而奏章仙都無名露章不被奏御所以爾者既無法軌身不清廉是故不為奏御又且星宿之官不受未戒不廉之師奏事故有大小科戒之法明各依承凡齋有五種之格如左第一救急治病承用天師旨教法人三元方謝乞生丐活自縳泥額塗炭之法並在旨教之中第二靈寶梵行集賢觀化修身種福之法其中又有生死謝罪責巳思愆之法第三上清仙隱為七世先亡遷升之齋亦隨月修直善行之法第四真一守寂思神吞氣導引之齋第五太一神丹宜祭爐火金液之法閉房經月之齋其别隱靜養神續命清詠長齋不在五條之例又道士祭酒男女官巳參受真契并受上清三洞之經及星宿治法為道欲得摽名玄都奏御旨聞當受玄都法難五戒其戒文如左第一之戒不得不敬於天不得謂天無神呼地元鬼不得輕慢地祇山川大澤而穿鑿無忌是謂天地無靈罪犯無畏又不得教令人輕慢天地謂無神鬼

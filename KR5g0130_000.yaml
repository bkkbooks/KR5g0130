body:
  text: 犯此一戒奪天算三百一犯此過減夀七年格事七年責巳思愆立功補過有殊於先伏誓三通然後啓復先位計功續命道不負人第二戒不得殺害衆生探巢破卵又不得教令人殺害衆生探巢破卵犯此一戒奪天算一百六十一犯此過減夀五年格事五年責巳思愆立功補過清善至到有殊於先伏誓三通然後啓復先位計功續命道不負人第三戒不得行欺巧竊盜貪心恣惡規圖人物奪人志願又不得教令人為巧竊貪圖人物奪人所愛犯此一戒奪天算一百二十一犯減夀四年格事四年責巳思愆積功補德有殊於先然後伏誓三通啓復先位計功續命道不負人第四戒不得飲酒外媱略他婦女媱通不道因公行私又不得教令人飲酒歡妻略他子女媱通不道因公行私犯此一戒奪天算一百二十一犯此過減夀四年格事四年思愆責巳立功補過有殊於先然後伏誓三通啓復先位計功續命道不負人第五戒不得詛佞嫉毒妬嫉無道讒害善人燌燒人舍又不得教令人詛佞嫉毒妬嫉無道讒害善人燌燒人舍破人門戶以報怨仇犯此一戒奪天算一百二十一犯此過減夀三年格事三年責巳思愆立功自補功德有殊於先然後伏誓三通啓復先位計功續命道不負人其為道士祭酒不受法戒不慎道行犯諸法禁拜表上章既自不聞至於救解往往無驗皆是為道無有法軌淪逮酒肉之考不慎之至自從三聖升化之後真科沉隱纍遭天地鄙烈法科零落舊章不存縱使祭酒未受法戒録籍之上巳為總忌自頃常慎上章先後云云紛互天曹不覺驗效者甚多百中誤有一效皆是善民告乞感徹丹善之至天帝直為擁護開許所奏全在性命爾功不在奏章祭酒而愚癡師輩或因承吉善之民感徹之心旁此一效以為巳功便恐動百姓求欲非一不知吞藏之咎巳被糾奏削其生名減其夀命不久奄而至以小愆目下未即考病便謂天地寥廓無校小漏或中有小功申延其考愆目轉多延不加小考者併其贓漏罪大在驅除之例爾必滅之後方付刀山劍樹之楚故不數加小考愚人不知謂為罪不即被考病謂天地許之縱恣又云上天漫漫不簡小愆故無考咎大以專愚推之通日愆咎轉謂天地無神有戒之者專虛妄爾不知巳在驅除之例奄至不期也天之昭昭其可欺也愚人無知謂道為輕吾念之痛心明各詳慎為善勿為貪濁罪坐不輕也髙上科曰道士祭酒男女受真至法并受上法寶經星宿正治位次真一以上并伏法受真好向之賢亦不可不參受法難五戒及因緣大戒既受至法不受此五戒名故不上仙都丹簡墨籙玉曆無名三官白籍鬼名不除滅度之後故為下鬼魂不得仙考對無巳殃及子孫其道民别有精誠否泰之驗不在此條中紀在墨籙上篇後也髙上科曰夫學道宜精勤立功補過以贖先亡七祖罪謫并又為家門及一身進上仙名去離十苦八難之中當受法難五戒立功建德求上名仙都玉曆削除三官白簿死籍汝等為道徒受大法內外真契積歷年載而用行不合自然又不受法難五戒身犯酒肉貪穢道行無法故犯愆惡亡算滅命死為下鬼不免刀山劔樹之楚塗酷之心為之痛心痛心汝曹為道明依法戒奉行三年不倦尅獲延年天算加益天曹一年三考墨籙計功益算紀司命奏上分别善惡即度功德著左契犯惡非度著右契事有炳然道不負人但人信真者少罪法犯戒者多故罹罪坐愆爾明各慎之慎之為善凡為道士祭酒男女官受真法請求仙度延續生命并行戒法立功補過醫治百姓表章旨御者當由修練齋直奉受法戒不違科制舉向從願計功升度祿夀不訾也髙上科曰其有出自貴分雖不受此戒之文用行巳合自然不須復受科戒自古及今多有此人然今時百中獲有一耳不可準以為例要標其德行合科戒者自非抗志絶尚之人故須科戒成生道業如此不可不宣告戒制也髙上科曰凡欲學道求真於世立功建德紀名上天升度仙官者當受法難五戒依法戒行道三年功立真名然後表上仙都紀在丹簡上諱玉曆仙籍名立司命宣勑五嶽告下三官紀知真人削滅三官死籍白簿除去鬼名然後正可得為修學道士祭酒爾如此真名勤在仙都所奏無不徹聞既不受戒又不精苦仙都無有功名表章啓奏悉備停奏是為道行無聞徒損民人敬向紙筆香油之費更受吞藏酒肉之考魂神常被訟對凡向不利或有冒法未被考坐或是卷首三官未有死籍常見好事惡事未至者或是宿有𡨚對考官故迷其心罪并重論故不被小考近使贓滿併入驅除夭終之也豈不痛哉痛哉始學道士祭酒男女官汝曹欲修命清苦求真并制鬼治病立有驗效為百姓所崇當受法難五戒既受戒仙都便以紀名修勤三年不犯法目司命列奉上白天帝紀名玉曆便受真人之散號能制鬼治病無不明效如此之善可不修乎道士祭酒男女官欲修學制鬼治病當受太上中臺成生五戒既受此戒仙都正位丹簡有録功勤三年標名上勒玉曆天帝曹即考挍功勤勒山川五嶽四瀆三官録紀知汝曹精進積感之功名標玄都天神玄都地祇所欽百鬼所伏救治表奏上逹汝曹徒受中外大事真一之妙不受法難不慎五戒則仙都無位玉曆無名身受祭酒藏穢之罪五嶽四瀆三官鬼神所不敬畏章奏寢㯓不被呈御坐其好走里巷貪濁毀辱不知攺忤違科犯忌司命隨事糾奏減奪夀算既為人師冒法小事不足數考蒙其知悔故并之重論令人愚癡謂為愆目下未病便言天地不知其罪又云無神不知隂考已奏既有𡨚對小事故不數奏者欲積其贓滿併在驅除之例爾如此死名巳定不復小考奄被大除夭折當世不終三夀罪目兼重復加刀山火霍之楚死為下鬼長被痛毒當可言乎汝輩受真外欲立功救治欲練氣三元養神續命當訪求明師奉行法戒勿貪酒肉沉湎相逐不軌之事過無大小悉受糾奏唯晨夕齋直積功補過仰希玄澤停年住考爾如此延續性命還其年算與之更始功過相補細而不漏汝曹明各慎之慎之修練保得長在不朽髙上科曰道士祭酒男女官汝欲修錬太清神丹并練三元牝牡之術冥身山澤思仙養志者先受成生五戒又經七試九錬摧性忍弱被人凌辱不以怨恥者又不以外想邪心靜神專一者又當忍受飢寒委辱不恚不墜者又當積勤立功廣大濟度厄急拔度死命受更生之始者又當單食精苦隂德廣著天未報功不敢希望者勳義感徹積勤之大身嬰困弊逺近無問不敢自悼者弘惠流布更被曲辱不以為害皆此智德大矣其德有五自非冥心篤好不能立此行也是故有五德之號其至甚重大矣哉學道積年乃經十折九辱穢惡橫加猶懷慊恪忍弱之仁此為一智強行廣博好尚內外𨗳養三元五神不傷邁而不衰容色不悴是為有恆其為二智尚修不退周流八方一清一沉一濁一浮勤功世間不紀不名積德不已敢以為勞其為三智隂結藥氣含德養性展轉九年中至二十四年上至三十二年積苦效勤而橫被曲折愍念不計恬靖自居恆無功可紀更懷憂切其智四矣為道既無世功相及少修師教伏勤師門而中遭禍構散蕩弊真經十折萬忍猶懷頥頥不硎於口其智五也髙上科曰凡人學道守心貞一施行善篤終未感悟又經歷七試九折心無恚退奉行五戒合於五智不違法戒不𧇊經教幽靜恬和行及無為久染風塵曲辱不計遭逢凶橫叩摶乞過纍遭轗軻不以為恚殊更施惠自幸布乞於人恆懼失先功勤恐宿緣深重收致不利有此巍巍之德勳著曠大不名為勞清淨丹苦殊更堅恪懼墜淵谷不朝則夕如此之智真為厚大德行如此正可以立道行行之五年恬然無欲可得投身林隱託命巖藪汝等求道修命延夀人間當先處曲室和神養志𨗳練三元積勤專到上感靈真身被災咎不求申論曲辱不利歡心頥頥不以為否行此五戒成生五智道行清潔剋功巍巍之重未敢希報反更勇猛精進常所未能相及其功既積何求不得何願不合何叩不聞何志不成耶髙上科曰仙有九品術有三十六門又有百二十禁法皆延生之原要未有依科求志苦到而不獲者乎但患人修學無勤思道不專執無恆無有同心志契者道安可修乎但聞朝施暮望輕忽正教謂無靈感多有慳貪媾辱淪逐酒肉之座無志精苦於玄元施為混錯罪磐於天府魂思閉繫考楚於地獄未蒙判析故宜深思自攺勤施德專以求真明之效有智之人聞而行之奉慎五戒不亦妙乎小齋法主人供一賢德一日一人長錢一百米菜茶果蜜薑之屬中齋千食供一人一日長錢二百米菜香花燈燭茶果蜜薑之屬右二件計人請齋官人率增之又一條其困病祈請齋菜食如小齋之法靈寶延年齋千食隨主人供唯不得殺生犯科爾上清轉經清寂山林長齋米菜服食菜食為恆不在錢數之料右五等如品格太一閉房舍丹藥百日大齋法不在錢限之例古者盟誓金綵之屬今以丹青四十尺金環一雙代之也洞真太上八素真經修習功業妙訣
